<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Luxe Interiors</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f6f8;
            color: #333;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        h1 {
            color: #0f1115;
            margin: 0;
        }
        .back-link {
            color: #4a90e2;
            text-decoration: none;
            font-weight: 500;
        }
        .table-container {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background-color: #fafafa;
            font-weight: 600;
            color: #555;
        }
        tr:last-child td {
            border-bottom: none;
        }
        .btn-delete {
            background-color: #ff4d4f;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-delete:hover {
            background-color: #d9363e;
        }
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Leads Dashboard</h1>
            <a href="/" class="back-link">&larr; Back to Site</a>
        </header>

        <div class="table-container">
            <table id="leadsTable">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Project Type</th>
                        <th>Message</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="leadsBody">
                    <!-- Leads will be injected here -->
                </tbody>
            </table>
            <div id="emptyState" class="empty-state" style="display: none;">
                No leads found.
            </div>
        </div>
    </div>

    <script>
        async function fetchLeads() {
            try {
                const response = await fetch('/api/leads');
                const leads = await response.json();
                
                const tableBody = document.getElementById('leadsBody');
                const emptyState = document.getElementById('emptyState');
                
                tableBody.innerHTML = '';
                
                if (leads.length === 0) {
                    emptyState.style.display = 'block';
                } else {
                    emptyState.style.display = 'none';
                    leads.forEach(lead => {
                        const tr = document.createElement('tr');
                        const date = new Date(lead.dateReceived).toLocaleString();
                        
                        tr.innerHTML = `
                            <td>${date}</td>
                            <td>${sanitize(lead.name)}</td>
                            <td><a href="mailto:${sanitize(lead.email)}">${sanitize(lead.email)}</a></td>
                            <td>${sanitize(lead.phone) || '-'}</td>
                            <td>${sanitize(lead.projectType)}</td>
                            <td><div style="max-height: 100px; overflow-y: auto;">${sanitize(lead.message) || '-'}</div></td>
                            <td>
                                <button class="btn-delete" onclick="deleteLead(${lead.id})">Delete</button>
                            </td>
                        `;
                        tableBody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error('Error fetching leads:', error);
                alert('Failed to load leads. Make sure server is running.');
            }
        }

        async function deleteLead(id) {
            if (confirm('Are you sure you want to delete this lead?')) {
                try {
                    const response = await fetch(`/api/leads/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        fetchLeads(); // Refresh table
                    } else {
                        alert('Failed to delete lead.');
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            }
        }

        function sanitize(str) {
            if (!str) return '';
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML;
        }

        // Load initially
        fetchLeads();
    </script>
</body>
</html>
